<main class="auth-page">
  <form class="auth-card" [formGroup]="form" (ngSubmit)="submit()">
    <h1 class="auth-title">Registracija</h1>

    @if (error()) {
      <p class="auth-error">{{ error() }}</p>
    }

    <label class="auth-field">
      <span>Ime za prikaz</span>
      <input type="text" formControlName="displayName" autocomplete="name" />
    </label>

    <label class="auth-field">
      <span>Korisničko ime</span>
      <input type="text" formControlName="username" autocomplete="username" />
    </label>

    <label class="auth-field">
      <span>Email</span>
      <input type="email" formControlName="email" autocomplete="email" />
    </label>

    <label class="auth-field">
      <span>Lozinka</span>
      <input type="password" formControlName="password" autocomplete="new-password" />
    </label>

    <button class="auth-btn" type="submit" [disabled]="submitting()">
      {{ submitting() ? 'Kreiranje naloga…' : 'Registruj se' }}
    </button>

    <p class="auth-alt">Već imaš nalog? <a routerLink="/login">Prijavi se</a></p>
  </form>
</main>
