services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Your_password123!}
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Blog.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=mssql,1433;Database=BlogDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_password123!};TrustServerCertificate=True"
      Jwt__Secret: ${JWT_SECRET:-docker-dev-blog-jwt-secret-change-in-production-0123456789abcdef}
      Cors__AllowedOrigins__0: "http://localhost:4200"
    depends_on:
      mssql:
        condition: service_healthy
    ports:
      - "5007:8080"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - api
    ports:
      - "4200:80"

volumes:
  mssql-data:
